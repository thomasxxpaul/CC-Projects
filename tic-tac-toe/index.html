<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      font-size: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #0f9b8e; }
    .cell.winner { background: #0f3460; }

    #restart {
      margin-top: 1.5rem;
      padding: 0.6rem 1.8rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    #restart:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <button id="restart">Restart</button>

  <script>
    const board = document.getElementById('board');
    const status = document.getElementById('status');
    const restart = document.getElementById('restart');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let cells, current, gameOver;

    function init() {
      cells = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      status.textContent = `Player X's turn`;
      board.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.i = i;
        cell.addEventListener('click', handleClick);
        board.appendChild(cell);
      }
    }

    function handleClick(e) {
      const i = +e.target.dataset.i;
      if (gameOver || cells[i]) return;

      cells[i] = current;
      const el = e.target;
      el.textContent = current;
      el.classList.add(current.toLowerCase(), 'taken');

      const winner = getWinner();
      if (winner) {
        winner.forEach(i => board.children[i].classList.add('winner'));
        status.textContent = `Player ${current} wins!`;
        gameOver = true;
      } else if (cells.every(Boolean)) {
        status.textContent = `It's a draw!`;
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `Player ${current}'s turn`;
      }
    }

    function getWinner() {
      for (const [a, b, c] of WINS) {
        if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    restart.addEventListener('click', init);
    init();
  </script>
</body>
</html>
